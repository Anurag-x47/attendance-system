<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"><title>Admin Login - StuAttend AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0f172a;">
    <div class="card" style="width:100%; max-width:400px; padding:3rem 2rem;">
        <div style="text-align:center; margin-bottom:2rem;">
            <div class="brand-icon" style="margin:0 auto 1rem; background:var(--error);">A</div>
            <h2 style="font-weight:800;">Admin Login</h2>
            <p style="color:var(--text-muted);">Restricted Management Access</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div style="background:rgba(239,68,68,0.1); color:#ef4444; padding:0.75rem; border-radius:12px; margin-bottom:1.5rem; text-align:center; font-size:0.875rem;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <input type="text" name="username" placeholder="Admin Username" required style="width:100%; padding:1rem; border-radius:12px; background:var(--bg-dark); border:1px solid var(--border); color:white; margin-bottom:1rem;">
            <input type="password" name="password" placeholder="Password" required style="width:100%; padding:1rem; border-radius:12px; background:var(--bg-dark); border:1px solid var(--border); color:white; margin-bottom:2rem;">
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:1rem; background:var(--error);">Authorize Session</button>
        </form>
        <div style="text-align:center; margin-top:2rem;">
            <a href="{{ url_for('student_login') }}" style="color:var(--text-muted); text-decoration:none; font-size:0.875rem;">Student Login →</a>
        </div>
    </div>
</body>
</html>
