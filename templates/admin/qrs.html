{% extends "base.html" %}

{% block title %}Identity Registry{% endblock %}

{% block content %}
<div class="card animate-up">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
        <div>
            <h3 style="font-size: 1.5rem; font-weight: 800;">Digital Student Tokens</h3>
            <p style="color: var(--text-muted); font-weight: 500;">Distribute these unique identifiers for secure entry.</p>
        </div>
        <button class="btn btn-primary" onclick="window.print()">
            <i class="fas fa-print"></i> Batch Print
        </button>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem;">
        {% for s in students %}
        <div class="card" style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); text-align: center; padding: 2rem;">
            <div style="position: relative; padding: 1.5rem; background: white; border-radius: 20px; display: inline-block; margin-bottom: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                <img src="{{ url_for('static', filename=s.qr_code_path) if s.qr_code_path else '#' }}" alt="QR Code" style="width: 180px; height: 180px; display: block;">
                <div style="position: absolute; inset: 0; border: 4px solid var(--primary); border-radius: 20px; pointer-events: none; opacity: 0.1;"></div>
            </div>
            
            <h4 style="font-size: 1.2rem; font-weight: 800; margin-bottom: 0.25rem;">{{ s.name }}</h4>
            <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 2rem;">
                <span class="badge" style="background: rgba(124, 58, 237, 0.1); color: var(--primary); font-family: monospace;">{{ s.student_id }}</span>
                <span class="badge" style="background: rgba(255,255,255,0.05); color: var(--text-muted);">{{ s.class }}</span>
            </div>
            
            <a href="{{ url_for('static', filename=s.qr_code_path) if s.qr_code_path else '#' }}" download="{{ s.student_id }}_QR.png" class="btn" style="width: 100%; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--glass-border);">
                <i class="fas fa-cloud-arrow-down"></i> Export Token
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
