<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | StuAttend AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="card animate-up" style="width:100%; max-width:440px; padding:3.5rem 2.5rem; text-align:center; border-color: rgba(244, 63, 94, 0.2);">
        <div class="brand-icon" style="margin: 0 auto 1.5rem; width: 60px; height: 60px; font-size: 1.8rem; background: linear-gradient(135deg, #f43f5e, #fb7185); box-shadow: 0 8px 16px rgba(244, 63, 94, 0.4);">A</div>
        <h2 style="font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem;">Admin Access</h2>
        <p style="color: var(--text-muted); font-weight: 500; margin-bottom: 3rem;">Restricted area for system administrators.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="badge badge-error" style="width: 100%; justify-content: center; padding: 1rem; margin-bottom: 2rem; border-radius: 12px;">
                <i class="fas fa-shield-halved"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">Username</label>
                <input type="text" name="username" placeholder="Enter admin username" required>
            </div>
            <div style="text-align: left; margin-bottom: 2.5rem;">
                <label style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;">Security Key</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; padding: 1.25rem; background: #f43f5e; color: white; box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3);">
                Authorize Session <i class="fas fa-lock"></i>
            </button>
        </form>

        <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--glass-border);">
            <p style="color: var(--text-muted); font-size: 0.9rem;">Are you a student? <a href="{{ url_for('student_login') }}" style="color: var(--primary); text-decoration: none; font-weight: 700;">Student Portal</a></p>
        </div>
    </div>
</body>
</html>
